<body>
<script>
function findLargestElement(array) {
	return Math.max(...array);
}

const numbers = [68,85,27,15,12,58,78,92];
const LargestElement = findLargestElement(numbers);
console.log("The Largest Element in array is:", LargestElement);
</script>
