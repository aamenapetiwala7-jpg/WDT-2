<html>
<head>
</head>
<body>
<input type = "text" id="str" placeholder="Enter your string"></input>
<button onclick = "strfunction()">Click Here</button>
<script>
function strfunction()  {
	let str = document.getElementById("str").value;
	console.log("Length:" + str.length + "<br>");
	document.write("Bold:" + str.bold + "<br>");
	document.write("Character at index 7:" + str.charAt(7) + "<br>");
	document.write("Italics" + str.italics() + "<br>");
	document.write("Lowercase:" + str.toLowerCase() + "<br>");
	document.write("Uppercase:" + str.toUpperCase() + "<br>");
	document.write("Substring (0,10):" + str.substring(0,10) + "<br>");
	}
	</script>
</body>
</html>
