<html>

</head>
<body>
<label for="num1">No1</label>
<input type ="number" id="num1" placeholder="Enter no1"><br>
<label for="num1">No2</label>
<input type ="number" id="num2" placeholder="Enter no2"><br>
<div>
<button onclick="performOperation('+')">+</button>
<button onclick="performOperation('-')">-</button>
<button onclick="performOperation('*')">*</button>
<button onclick="performOperation('/')">/</button>
</div>
<label for="ans">Ans:</label>
<input type="text" id="ans"readonly>
<script>
	function performOperation(operator) {
		const num1 = parseFloat(document.getElementById('num1').value);
		const num2 = parseFloat(document.getElementById('num2').value);
		let result;
		switch (operator) {
		  case'+':
			result = num1 + num2;
			break;
		case'-':
			result = num1 - num2;
			break;
		case'*':
			result = num1 * num2;
			break;
		 case'/':
			result = num1 / num2;
			break;
		default:
			alert("Invalid Operation!");
			return;
		}
	document.getElementById('ans').value = result;
}
</script>
</body>
</html>
