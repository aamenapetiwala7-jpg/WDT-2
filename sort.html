<body>
<script>
console.log("Ascending Order");
let numbers = [35,75,24,2,58,96,32,64,13,5];
numbers.sort((a,b) => a-b);
console.log("Sorted numbers (ascending):",numbers);

console.log("Decending Order");
numbers.sort((a,b) => b-a);
console.log("Sorted numbers (desending):",numbers);


</script>
