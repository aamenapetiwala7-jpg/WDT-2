<html>
    <head>
         <script src="z:\WDT-2\jfile.js"> </script>
        <style>
            .highlight {
                background-color:yellow;
            }
            .highlight-all {
                background-color: lightgreen;
            }
        </style>
    </head>
    <body>
        <h2>jQuery <code>next() </code> and <code> nextAll()</code> </h2>
        <button id="nextBtn">Highlight Next </button>
        <button id="nextAllBtn">Highlight All Next </button>
    <ul>
        <li>Item 1</li>
        <li class="selected"> Item 2</li>
        <li>Item 3</li>
        <li>Item 4</li>
        </ul>
        <script>
            $(document).ready(function () {
                $("#nextBtn").click(function () {
                    $(".selected").next().addClass("highlight");
                });
                $("#nextAllBtn").click(function () {
                $(".selected").nextAll().addClass("highlight-all");
            });
        });
            </script>
            </body>
            </html>
