<html>
    <head>
        <script src="z:\WDT-2\jfile.js"></script>

        <style>
            #panel {
                width: 300px;
                height: 150px;
                background-color: green;
                color: white;
                text-align: center;
                line-height: 150px;
                display:none;
            }
        </style>
    </head>
    <body>
        <button id="showBtn">Fade In </button>
        <button id="hideBtn">Fade Out </button>
        <button id="toggleBtn">Slide Toogle </button>
        <div id="panel">Hello Animation </div>
        <script>
            $(document).ready(function() {
                $("#showBtn").click(function() {
                    $("#panel").fadeIn(1000);
                });

                $("#hideBtn").click(function() {
                    $("#panel").fadeOut(1000);
                });

                $("#toggleBtn").click(function() {
                    $("#panel").slideToggle(1000);
                });
                });
            </script>
        </body>
        </html>
